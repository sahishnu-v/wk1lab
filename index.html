<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <nav>
      <a href="/" aria-current="page">Home</a>
      <a href="/page2.html">Other page</a>
    </nav>
    <main>
      <h1>Home page</h1>

      <h2>Welcome</h2>

      <p>look at this dog</p>

      <img src="puppy.png" alt="puppy" style="width: 200px; height: auto;" />

      <div>
        <ul>
          <li>Item one</li>
          <li>Item two</li>
          <li>Item three</li>
        </ul>
      </div>

      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required />

        <label for="birthdate">Date of birth</label>
        <input type="date" id="birthdate" name="birthdate" required />

        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />

        <button type="submit">Submit</button>
      </form>

      <iframe width="560" 
      height="315" 
      src="https://www.youtube.com/embed/54dabgZJ5YA?si=j-sNdHb2suS4KAHG" 
      title="YouTube video player" 
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
      referrerpolicy="strict-origin-when-cross-origin" 
      allowfullscreen></iframe>

    </main>
  </body>
</html>
